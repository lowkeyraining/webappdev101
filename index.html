<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@200;300;400&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)),
                url('https://images.unsplash.com/photo-1557682250-33bd709cbe85?q=80&w=2029');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            overflow: hidden;
        }
        
        /* Overlay Effect */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
        }
        
        /* Animated grain texture */
        body::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            animation: grain 8s steps(10) infinite;
            pointer-events: none;
        }
        
        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -10%); }
            20% { transform: translate(-15%, 5%); }
            30% { transform: translate(7%, -25%); }
            40% { transform: translate(-5%, 25%); }
            50% { transform: translate(-15%, 10%); }
            60% { transform: translate(15%, 0%); }
            70% { transform: translate(0%, 15%); }
            80% { transform: translate(3%, 35%); }
            90% { transform: translate(-10%, 10%); }
        }
        
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 0;
            box-shadow: 
                0 8px 32px 0 rgba(0, 0, 0, 0.37),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        /* Profile Image */
        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 0 0 1px rgba(255, 255, 255, 0.1),
                0 8px 24px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .profile-img::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.1) 50%,
                transparent 70%
            );
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        
        /* Typography */
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5em;
            font-weight: 300;
            color: #fff;
            margin-bottom: 15px;
            letter-spacing: 3px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
            animation: fadeInText 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }
        
        @keyframes fadeInText {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Divider */
        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
            margin: 30px auto;
            animation: fadeInText 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
        }
        
        /* Info */
        .info {
            animation: fadeInText 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.7s both;
        }
        
        .info-item {
            font-size: 1em;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 2px;
            line-height: 2;
            text-transform: uppercase;
            font-size: 0.75em;
        }
        
        .info-item span {
            display: block;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85em;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        
        /* Contact Button */
        .contact {
            margin-top: 50px;
            animation: fadeInText 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.9s both;
        }
        
        .btn {
            display: inline-block;
            padding: 14px 40px;
            background: transparent;
            color: #fff;
            text-decoration: none;
            font-size: 0.7em;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 50px 30px;
            }
            
            h1 {
                font-size: 2.5em;
                letter-spacing: 2px;
            }
            
            .profile-img {
                width: 120px;
                height: 120px;
                font-size: 3em;
            }
            
            .info-item {
                font-size: 0.7em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-img">
            ✦
        </div>
        
        <h1>Rungrawi Kaeongam</h1>
        
        <div class="divider"></div>
        
        <div class="info">
            <div class="info-item">
                <span>Faculty</span>
                คณะเทคโนโลยีสารสนเทศและการสื่อสาร
            </div>
            <div class="info-item">
                <span>Major</span>
                วิทยาการคอมพิวเตอร์
            </div>
        </div>
        
    </div>
</body>
</html>
